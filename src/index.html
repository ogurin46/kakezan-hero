<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>けいさんヒーロー</title>
  <!-- ?v= はキャッシュバスター: 更新時に数字を上げると全端末に即反映される -->
  <link rel="stylesheet" href="style.css?v=32">
</head>
<body>
<div id="app">

  <!-- タイトル -->
  <section id="screen-title" class="screen">
    <div class="title-bg-stars" id="title-stars"></div>
    <div class="title-top-area">
      <p class="title-sub-top">⚡ もんすたーをたおせ！</p>
      <h1>けいさん<br>ヒーロー</h1>
      <p class="title-sub-btm">かけざん・たしざん・ひきざん</p>
    </div>
    <p class="tap-to-start">タップでスタート！</p>
    <div class="title-bottom-area">
      <img id="title-hero-img-main" src="img/hero_shuketsu.png" class="title-hero-zenbody" alt="ヒーローたち">
    </div>
  </section>

  <!-- セーブ選択 -->
  <section id="screen-save-select" class="screen hidden">
    <div class="title-bg-stars" id="save-stars"></div>
    <div class="save-select-inner">
      <h2 class="save-screen-title">セーブデータを えらんでね！</h2>
      <div id="save-slots"></div>
      <button class="save-back-btn" onclick="initTitle()">◀ もどる</button>
    </div>
  </section>

  <!-- 名前入力 -->
  <section id="screen-name-input" class="screen hidden">
    <div class="title-bg-stars" id="name-stars"></div>
    <div class="name-input-inner">
      <p class="name-input-title">なまえを いれてね！</p>
      <input type="text" id="player-name-input" maxlength="8" placeholder="なまえ（8文字まで）" autocomplete="off">
      <button id="btn-name-confirm" class="big-btn pulse-btn">けってい ▶</button>
      <button class="save-back-btn" onclick="showSaveSelect()">◀ もどる</button>
    </div>
  </section>

  <!-- ヒーロー選択 -->
  <section id="screen-hero-select" class="screen hidden">
    <div class="title-bg-stars" id="hero-sel-stars"></div>
    <div class="hero-select-inner">
      <p class="hero-select-header">ヒーローを えらんでね！</p>
      <div class="hero-carousel-row">
        <button class="hero-carousel-btn" id="hero-prev-btn">◀</button>
        <div id="hero-select-image-wrap">
          <img id="hero-carousel-img" src="" alt="">
        </div>
        <button class="hero-carousel-btn" id="hero-next-btn">▶</button>
      </div>
      <div id="hero-carousel-dots"></div>
      <p id="hero-select-name"></p>
      <div class="hero-select-footer">
        <button id="btn-hero-confirm" class="big-btn pulse-btn">このヒーローでスタート！ ▶</button>
        <button class="save-back-btn" onclick="showSaveSelect()">◀ もどる</button>
      </div>
    </div>
  </section>

  <!-- ホーム（モード＆ステージ選択） -->
  <section id="screen-home" class="screen hidden">
    <div class="title-bg-stars" id="home-stars"></div>
    <div class="home-inner">
      <p class="home-title">モードと ステージを えらんでね！</p>
      <div id="mode-tabs">
        <button class="mode-tab" data-mode="kake">✖️ かけざん</button>
        <button class="mode-tab" data-mode="tashi">➕ たしざん</button>
        <button class="mode-tab" data-mode="hiki">➖ ひきざん</button>
        <button class="mode-tab" data-mode="mix">🎲 ミックス</button>
      </div>
      <div id="stage-grid"></div>
      <p id="home-player-info"></p>
      <div class="home-footer">
        <button class="save-back-btn" onclick="showHeroSelect(false)">ヒーローをかえる</button>
        <button class="save-back-btn" onclick="showSaveSelect()">◀ セーブせんたく</button>
      </div>
    </div>
  </section>

  <!-- バトル -->
  <section id="screen-battle" class="screen hidden">
    <div id="stage-bar">
      <span id="stage-label"></span>
      <div id="xp-section">
        <span id="lv-label">LV.1</span>
        <div id="xp-bar-wrap"><div id="xp-bar"></div></div>
      </div>
      <div id="hero-hearts"></div>
      <button id="btn-mute" class="mute-btn" title="音のオン/オフ">🔊</button>
      <button id="btn-quit-battle" class="mute-btn" title="ホームにもどる">🏠</button>
    </div>

    <div id="battle-field">
      <canvas id="battle-canvas"></canvas>
      <div id="battle-overlay">
        <div id="attack-beam" class="hidden"></div>
        <div id="hit-flash" class="hidden"></div>
      </div>
      <div id="atk-label" class="hidden"></div>
      <div id="enemy-serif" class="hidden"></div>
      <div id="hero-cutin" class="hidden">
        <div class="cutin-band"></div>
        <div class="cutin-face"></div>
        <div class="cutin-text">とどめだ！！</div>
      </div>
    </div>

    <div id="battle-hp-row">
      <span id="wave-label"></span>
      <span class="hp-name" id="enemy-hp-name"></span>
      <div class="hp-bar-wrap"><div id="enemy-hp-bar" class="hp-bar enemy-bar"></div></div>
    </div>

    <div id="question-area">
      <div id="question-box">
        <div id="question-label">⚡ もんだい！</div>
        <span id="question-text"></span>
      </div>
      <div id="choices"></div>
    </div>

    <div id="battle-msg" class="hidden"></div>
  </section>

  <!-- ステージクリア -->
  <section id="screen-stage-clear" class="screen hidden">
    <div class="result-content">
      <p class="result-icon" id="clear-icon">🎉</p>
      <p class="result-title">やっつけた！</p>
      <p class="result-detail" id="clear-detail"></p>
      <div id="medal-result"></div>
      <div id="score-display"></div>
      <div id="xp-gained"></div>
      <button id="btn-bonus" class="big-btn bonus-btn">🎁 ごほうびゲーム！</button>
      <button id="btn-next-stage" class="big-btn">つぎのステージへ ▶</button>
      <div class="clear-btn-row">
        <button id="btn-clear-retry" class="sub-btn">🔁 もういっかい</button>
        <button id="btn-clear-home" class="sub-btn">ホームへ 🏠</button>
      </div>
    </div>
  </section>

  <!-- ごほうびゲーム選択 -->
  <section id="screen-bonus-select" class="screen hidden">
    <p class="bonus-title">🎁 ごほうびゲーム！</p>
    <p class="bonus-sub">すきなゲームをえらんでね</p>
    <button id="btn-bonus-rhythm" class="big-btn rhythm-btn">🎵 ウルトラリズム！</button>
    <button id="btn-bonus-janken" class="big-btn janken-btn">✌️ じゃんけん！</button>
    <button id="btn-bonus-memory" class="big-btn memory-btn">🃏 しんけいすいじゃく！</button>
    <button id="btn-bonus-back" class="sub-btn">もどる</button>
  </section>

  <!-- ウルトラリズム -->
  <section id="screen-rhythm" class="screen hidden">
    <button id="btn-rh-back" class="game-back-btn">← もどる</button>
    <canvas id="rhythm-canvas"></canvas>
    <div id="rh-result" class="rh-result-overlay hidden">
      <div id="rh-result-icon"></div>
      <div id="rh-result-text"></div>
      <div class="rh-btns">
        <button id="btn-rh-retry" class="big-btn">🔁 もう一回！</button>
        <button id="btn-rh-next" class="big-btn">つぎへ ▶</button>
      </div>
    </div>
  </section>

  <!-- じゃんけんモード選択 -->
  <section id="screen-janken-mode" class="screen hidden">
    <div class="jk-mode-inner">
      <p class="jk-mode-title">✌️ じゃんけん ボーナス！</p>
      <p class="jk-mode-enemy">あいては <strong id="jk-mode-boss-name"></strong></p>
      <div class="jk-mode-btns">
        <button id="btn-jk-1p" class="big-btn jk-mode-btn">
          <div class="jk-mode-icon">🧑</div>
          <div>ひとりで</div>
        </button>
        <button id="btn-jk-2p" class="big-btn jk-mode-btn">
          <div class="jk-mode-icon">👥</div>
          <div>ふたりで</div>
        </button>
      </div>
      <button class="sub-btn" id="btn-jk-cancel">もどる</button>
    </div>
  </section>

  <!-- じゃんけんヒーロー選択（2人対戦用） -->
  <section id="screen-janken-hero" class="screen hidden">
    <div class="jk-hs-inner">
      <p class="jk-hs-title"><span id="jk-hs-player"></span> の ヒーローを えらんでね！</p>
      <div class="hero-carousel-row">
        <button class="hero-carousel-btn" id="jk-hs-prev">◀</button>
        <div id="jk-hs-img-wrap">
          <img id="jk-hs-img" src="" alt="">
        </div>
        <button class="hero-carousel-btn" id="jk-hs-next">▶</button>
      </div>
      <p id="jk-hs-name" class="jk-hs-name"></p>
      <button id="btn-jk-hs-confirm" class="big-btn pulse-btn">このヒーロー！ ▶</button>
    </div>
  </section>

  <!-- じゃんけん本体 -->
  <section id="screen-janken" class="screen hidden">
    <button id="btn-jk-back" class="game-back-btn">← もどる</button>
    <div class="title-bg-stars" id="jk-stars"></div>
    <div id="jk-header">
      <div class="jk-hcol">
        <span id="jk-p1-label" class="jk-label"></span>
        <span id="jk-p1-score" class="jk-score"></span>
      </div>
      <span class="jk-vs">VS</span>
      <div class="jk-hcol jk-hcol-right">
        <span id="jk-p2-label" class="jk-label"></span>
        <span id="jk-p2-score" class="jk-score"></span>
      </div>
    </div>
    <div id="jk-field">
      <div id="jk-p1-char-wrap" class="jk-char-wrap">
        <img id="jk-p1-char" src="" alt="">
      </div>
      <div id="jk-field-center"></div>
      <div id="jk-p2-char-wrap" class="jk-char-wrap">
        <img id="jk-p2-char" src="" alt="">
      </div>
      <!-- Canvas はフィールド全体を覆う -->
      <canvas id="jk-canvas"></canvas>
      <!-- 選んだ手をキャラの上にオーバーレイ表示 -->
      <div id="jk-p1-hand-badge" class="jk-hand-badge"></div>
      <div id="jk-p2-hand-badge" class="jk-hand-badge jk-hand-badge-r"></div>
      <!-- UIオーバーレイ -->
      <div id="jk-countdown" class="hidden"></div>
      <div id="jk-result-banner" class="hidden"></div>
      <!-- とどめカットイン -->
      <div id="jk-cutin" class="hidden">
        <div class="jk-cutin-band"></div>
        <div class="jk-cutin-face" id="jk-cutin-face"></div>
        <div class="jk-cutin-text">わたしのかちだ！</div>
      </div>
    </div>
    <!-- グーチョキパー選択ボタン (フィールド下部) -->
    <div id="jk-controls">
      <div class="jk-ctrl-col" id="jk-p1-ctrl">
        <div class="jk-chosen" id="jk-p1-chosen">？</div>
        <div class="jk-hand-row" id="jk-p1-hand-btns">
          <button class="jk-hand" data-p="1" data-h="rock">👊<span>グー</span></button>
          <button class="jk-hand" data-p="1" data-h="scissors">✌️<span>チョキ</span></button>
          <button class="jk-hand" data-p="1" data-h="paper">✋<span>パー</span></button>
        </div>
      </div>
      <div class="jk-ctrl-col" id="jk-p2-ctrl">
        <div class="jk-chosen" id="jk-p2-chosen">？</div>
        <div class="jk-hand-row" id="jk-p2-hand-btns">
          <button class="jk-hand" data-p="2" data-h="rock">👊<span>グー</span></button>
          <button class="jk-hand" data-p="2" data-h="scissors">✌️<span>チョキ</span></button>
          <button class="jk-hand" data-p="2" data-h="paper">✋<span>パー</span></button>
        </div>
      </div>
    </div>
  </section>

  <!-- じゃんけん結果 -->
  <section id="screen-janken-result" class="screen hidden">
    <div class="jk-result-inner">
      <div id="jk-final-icon" class="jk-final-icon"></div>
      <p id="jk-final-title" class="jk-final-title"></p>
      <p id="jk-final-score" class="jk-final-score"></p>
      <div class="jk-result-btns">
        <button id="btn-jk-retry" class="big-btn">🔁 もういちど</button>
        <button id="btn-jk-next" class="big-btn">つぎへ ▶</button>
      </div>
    </div>
  </section>

  <!-- 神経衰弱モード選択 -->
  <section id="screen-memory-mode" class="screen hidden">
    <div class="jk-mode-inner">
      <p class="jk-mode-title">🃏 しんけいすいじゃく！</p>
      <p class="jk-mode-enemy">ヒーローカードを そろえよう！</p>
      <div class="jk-mode-btns">
        <button id="btn-mem-1p" class="big-btn jk-mode-btn">
          <div class="jk-mode-icon">🧑</div>
          <div>ひとりで</div>
        </button>
        <button id="btn-mem-2p" class="big-btn jk-mode-btn">
          <div class="jk-mode-icon">👥</div>
          <div>ふたりで</div>
        </button>
      </div>
      <button class="sub-btn" id="btn-mem-cancel">もどる</button>
    </div>
  </section>

  <!-- 神経衰弱ゲーム -->
  <section id="screen-memory" class="screen hidden">
    <button id="btn-mem-back" class="game-back-btn">← もどる</button>
    <div id="mem-header">
      <div class="mem-hcol" id="mem-p1-col">
        <span class="mem-hlabel">P1</span>
        <span class="mem-hscore" id="mem-p1-score">0</span>
      </div>
      <div id="mem-turn-banner">スタート！</div>
      <div class="mem-hcol mem-hcol-r" id="mem-p2-col">
        <span class="mem-hlabel">P2</span>
        <span class="mem-hscore" id="mem-p2-score">0</span>
      </div>
    </div>
    <div id="mem-grid"></div>
    <div id="mem-message" class="hidden"></div>
  </section>

  <!-- 神経衰弱結果 -->
  <section id="screen-memory-result" class="screen hidden">
    <div class="jk-result-inner">
      <div id="mem-result-icon" class="jk-final-icon"></div>
      <p id="mem-result-title" class="jk-final-title"></p>
      <p id="mem-result-detail" class="jk-final-score"></p>
      <div class="jk-result-btns">
        <button id="btn-mem-retry" class="big-btn">🔁 もういちど</button>
        <button id="btn-mem-next" class="big-btn">つぎへ ▶</button>
      </div>
    </div>
  </section>

  <!-- ゲームオーバー -->
  <section id="screen-gameover" class="screen hidden">
    <div class="result-content">
      <p class="result-icon">💥</p>
      <p class="result-title go-title">やられた…</p>
      <p class="result-detail" id="go-detail"></p>
      <button id="btn-retry" class="big-btn">もういちど ▶</button>
      <button id="btn-go-home" class="sub-btn">ホームへ 🏠</button>
    </div>
  </section>

  <!-- ビクトリー -->
  <section id="screen-victory" class="screen hidden">
    <div class="result-content">
      <div id="victory-confetti"></div>
      <p class="result-icon">🏆</p>
      <p class="result-title vic-title">ぜんぶクリア！！</p>
      <p class="result-detail" id="vic-detail"></p>
      <div id="vic-medals"></div>
      <div id="final-score"></div>
      <button id="btn-vic-home" class="big-btn">ホームへ 🏠</button>
    </div>
  </section>

</div>
<script src="game.js?v=40"></script>
</body>
</html>
